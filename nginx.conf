upstream app {
    server app:3000;
}

server {
    listen 8080;

    access_log /var/log/nginx/access.log;

    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    add_header X-Deployed-By swiftdeploy;


    location / {
       proxy_pass http://app;
       proxy_set_header Host $host;
       proxy_set_header X-Mode $upstream_http_x_mode; 
    }


    error_page 502 503 504 /error.json;
    location = /error.json {
        return 502 '{"error": "Bad Gateway", "code": "502", "service": "swiftdeploy", "contact": "admin@swiftdeploy.com"}';
    }
}
