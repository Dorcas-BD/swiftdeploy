version: '3.3'

services:
  app:
    image: swift-deploy-1-node:latest
    container_name: swiftdeploy-app
    environment:
      - MODE=canary
      - APP_VERSION=1.0.0
      - APP_PORT=3000
    networks:
      - swiftdeploy-network
    restart: always
    volumes:
      - swiftdeploy-logs:/app/logs
    cap_drop:
      - ALL
    user: appuser
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:latest
    container_name: swiftdeploy-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - swiftdeploy-logs:/var/log/nginx
    networks:
      - swiftdeploy-network
    depends_on:
      - app
    restart: always

networks:
  swiftdeploy-network:
    driver: bridge

volumes:
  swiftdeploy-logs:
